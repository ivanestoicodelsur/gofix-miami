version: '3.8'

services:
  app:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - mongo
      - redis
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/gofix
      - MONGO_URL=mongodb://mongo:27017/gofix
      - REDIS_URL=redis://redis:6379
    networks:
      - gofix_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gofix
    volumes:
      - gofix_postgres_data:/var/lib/postgresql/data
    networks:
      - gofix_net

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - gofix_mongo_data:/data/db
    networks:
      - gofix_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - gofix_redis_data:/data
    networks:
      - gofix_net

volumes:
  gofix_postgres_data:
  gofix_mongo_data:
  gofix_redis_data:

networks:
  gofix_net:
    driver: bridge
